[package]
name = "monocoque-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "High-performance ZeroMQ-compatible messaging runtime, io_uring by default with optional tokio and smol backends"
homepage = "https://github.com/vorjdux/monocoque"
documentation = "https://docs.rs/monocoque-rs"
readme = "../README.md"
keywords = ["zeromq", "zmq", "messaging", "io_uring", "async"]
categories = ["network-programming", "asynchronous"]

# docs.rs builds a crate with its default features only. The whole ZeroMQ API
# lives behind the opt-in `zmq` feature, so the default build renders an almost
# empty page. Build the docs with `zmq` (on top of the default runtime-compio
# backend) so the socket types show up.
[package.metadata.docs.rs]
features = ["zmq"]

[lib]
name = "monocoque"

