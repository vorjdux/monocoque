[lints]
workspace = true

[dependencies]
# Internal implementation crates (not exposed)
monocoque-core = { version = "0.3.0", path = "../monocoque-core", package = "monocoque-rs-core", default-features = false }
monocoque-zmtp = { version = "0.3.0", path = "../monocoque-zmtp", package = "monocoque-rs-zmtp", optional = true, default-features = false }

# Re-export dependencies for user convenience
bytes.workspace = true
compio-io.workspace = true
compio-buf.workspace = true
compio = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
smol = { workspace = true, optional = true }
tracing.workspace = true
tracing-subscriber.workspace = true

# Used by the PushFanOut / PullFanIn pipeline helpers (zmq feature only)
flume = { workspace = true, optional = true }

[dev-dependencies]
zmq.workspace = true
futures.workspace = true
criterion.workspace = true
gungraun.workspace = true
tokio.workspace = true
num_cpus.workspace = true
portpicker.workspace = true
hex.workspace = true
async-trait.workspace = true

[features]
default = ["runtime-compio"]

# Runtime backend selection (exactly one). See monocoque-rs-core for details.
runtime-compio = [
    "dep:compio",
    "monocoque-core/runtime-compio",
    "monocoque-zmtp?/runtime-compio",
]
runtime-tokio = [
    "dep:tokio",
    "monocoque-core/runtime-tokio",
    "monocoque-zmtp?/runtime-tokio",
]
runtime-smol = [
    "dep:smol",
    "monocoque-core/runtime-smol",
    "monocoque-zmtp?/runtime-smol",
]

# Protocol implementations (opt-in)
zmq = ["dep:monocoque-zmtp", "dep:flume"]

# Future protocols
# mqtt = ["dep:monocoque-mqtt"]
# amqp = ["dep:monocoque-amqp"]
