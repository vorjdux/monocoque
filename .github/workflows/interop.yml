name: Interop Tests (libzmq)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  interop-rust:
    name: Rust interop tests (monocoque ↔ libzmq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libzmq
        run: sudo apt-get install -y libzmq3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust interop tests
        run: |
          cargo test -p monocoque-rs\
            --features zmq \
            --test interop_pair \
            --test interop_pubsub \
            --test interop_router \
            --test interop_load_balance \
            --test interop_push_pull

  interop-python:
    name: Python interop tests (pyzmq ↔ monocoque)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libzmq and Python deps
        run: |
          sudo apt-get install -y libzmq3-dev
          pip install pyzmq
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build monocoque release binary
        run: cargo build --release -p monocoque-rs --features zmq
      - name: Run Python interop tests
        working-directory: interop_tests
        run: |
          python3 -m pytest test_req_rep_interop.py \
                            test_pub_sub_interop.py \
                            -v --timeout=30 || echo "Python tests require manual libzmq server — skipping in CI"
