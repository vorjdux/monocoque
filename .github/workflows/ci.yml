name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The runtime backends are mutually exclusive, so each is tested in its own
      # matrix leg with the same full-workspace command, differing only by the
      # feature flags that select the backend.
      matrix:
        backend:
          - { name: compio, flags: "--features zmq" }
          - { name: tokio, flags: "--no-default-features --features runtime-tokio,zmq" }
          - { name: smol, flags: "--no-default-features --features runtime-smol,zmq" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (${{ matrix.backend.name }} backend)
        run: cargo test --workspace ${{ matrix.backend.flags }}

  clippy:
    name: Clippy (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Same per-backend split as the test job. Every target (lib, tests,
      # benches, examples) is backend-agnostic, so all three legs lint the
      # identical `--all-targets` set, differing only by the backend feature.
      matrix:
        backend:
          - { name: compio, flags: "--all-targets --features zmq" }
          - { name: tokio, flags: "--all-targets --no-default-features --features runtime-tokio,zmq" }
          - { name: smol, flags: "--all-targets --no-default-features --features runtime-smol,zmq" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (${{ matrix.backend.name }} backend)
        run: cargo clippy --workspace ${{ matrix.backend.flags }} -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --workspace

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check docs (no warnings)
        run: cargo doc --no-deps --workspace --features zmq
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fuzz-build:
    name: Fuzz Targets (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Build fuzz targets
        run: cargo fuzz build --fuzz-dir monocoque-fuzz
