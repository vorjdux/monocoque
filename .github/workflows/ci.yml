name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Nightly timer for the heavy verification jobs (fuzz run, ThreadSanitizer)
  # that are too slow to gate every PR.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The runtime backends are mutually exclusive, so each is tested in its own
      # matrix leg with the same full-workspace command, differing only by the
      # feature flags that select the backend.
      matrix:
        backend:
          - { name: compio, flags: "--features zmq" }
          - { name: tokio, flags: "--no-default-features --features runtime-tokio,zmq" }
          - { name: smol, flags: "--no-default-features --features runtime-smol,zmq" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (${{ matrix.backend.name }} backend)
        run: cargo test --workspace ${{ matrix.backend.flags }}

  clippy:
    name: Clippy (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Same per-backend split as the test job. Every target (lib, tests,
      # benches, examples) is backend-agnostic, so all three legs lint the
      # identical `--all-targets` set, differing only by the backend feature.
      matrix:
        backend:
          - { name: compio, flags: "--all-targets --features zmq" }
          - { name: tokio, flags: "--all-targets --no-default-features --features runtime-tokio,zmq" }
          - { name: smol, flags: "--all-targets --no-default-features --features runtime-smol,zmq" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (${{ matrix.backend.name }} backend)
        run: cargo clippy --workspace ${{ matrix.backend.flags }} -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --workspace

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check docs (no warnings)
        run: cargo doc --no-deps --workspace --features zmq
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fuzz-build:
    name: Fuzz Targets (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Build fuzz targets
        run: cargo fuzz build --fuzz-dir monocoque-fuzz

  miri:
    name: Miri (unsafe buffer bookkeeping)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      # Miri proves the owned-buffer unsafe in io.rs (set_buf_init /
      # take_read_buffer) is sound. The IO-dependent unsafe (tcp from_raw_fd,
      # the inproc_stream cross-await pointer) needs a real runtime/syscalls and
      # cannot run under Miri.
      - name: Miri (io buffer tests)
        run: "cargo miri test -p monocoque-rs-core --lib io::"

  loom:
    name: Loom (publisher atomic orderings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Standalone crate so --cfg loom reaches only loom, not the flume /
      # concurrent-queue deps of the real crates.
      - name: Loom model tests
        run: cargo test --manifest-path monocoque-loom/Cargo.toml
        env:
          RUSTFLAGS: "--cfg loom"

  fuzz-run:
    name: Fuzz Targets (run)
    # Timed run, too slow for every PR: nightly schedule + manual dispatch only.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run each fuzz target (60s)
        run: |
          set -euo pipefail
          for t in fuzz_decoder fuzz_frame_codec fuzz_security_plain \
                   fuzz_subscription_trie fuzz_curve_handshake \
                   fuzz_greeting fuzz_command fuzz_zap_request; do
            echo "::group::$t"
            cargo fuzz run --fuzz-dir monocoque-fuzz "$t" -- \
              -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  tsan:
    name: ThreadSanitizer (core handoffs)
    # Rebuilds std with -Zbuild-std; scheduled + manual dispatch only.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      # ThreadSanitizer over the core crate's thread/channel handoffs
      # (byte-backpressure Condvar, flume monitor/hub channels). Run on the
      # tokio backend because TSan cannot instrument compio's io_uring path.
      - name: cargo test under ThreadSanitizer
        run: >
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu
          -p monocoque-rs-core --no-default-features
          --features runtime-tokio --lib
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
          TSAN_OPTIONS: "halt_on_error=1"
