name: Instruction Counts

# Runs the IO-free hot-path instruction-count bench (benches/instr_hotpath.rs)
# under callgrind. Deterministic instruction counts catch small CPU regressions
# that the noisy wall-clock benches cannot. The bench fails the job if any
# benchmark's instruction count (Ir) rises more than 5% above the baseline
# persisted in the cached target dir.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Must match the exact `gungraun` library pin in the workspace Cargo.toml; the
  # runner binary refuses to run against a newer library version.
  GUNGRAUN_VERSION: 0.19.4

jobs:
  instr-hotpath:
    name: Hot-path instruction counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Persists target/ across runs so callgrind has a baseline to compare a PR
      # against (keyed on the workflow + lockfile).
      - uses: Swatinem/rust-cache@v2
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Install gungraun-runner
        run: cargo install gungraun-runner --version "${GUNGRAUN_VERSION}" --locked
      # The hot path is runtime-agnostic (codec, buffer, vectored-slice builder),
      # so one backend leg suffices; use the default (compio) plus zmq.
      - name: Run hot-path instruction-count bench
        run: cargo bench --bench instr_hotpath --features zmq
